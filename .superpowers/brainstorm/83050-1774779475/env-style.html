  </div>

  <div class="card" data-choice="tropical" onclick="toggleSelect(this)">

      </div>
    </div>

    </div>
  </div>

  <div class="card" data-choice="polar" onclick="toggleSelect(this)">

        <div class="dark-blue"></div>
        <div class="vent">🔥 ♨️</div>
      </div>
    </div>
    <div class="card-body">
      <h3>极地/深海主题 🧊</h3>

    </div>
  </div>
