<h2>宝箱外观设计</h2>
<p class="subtitle">物品美化优先 - 决定所有宝箱的外观风格</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>统一外观</h3>
      <p>所有宝箱外观相同，用标签文字区分类型（+EXP、CD-3s、无敌等）</p>
      <p style="color:#888;font-size:12px">简单统一，容易实现</p>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>统一精美造型 + 光效区分</h3>
      <p>所有宝箱用精美 3D 风格宝箱造型，颜色/光晕根据类型不同（绿色=血、蓝色=技能、金色=经验等）</p>
      <p style="color:#888;font-size:12px">视觉更精美，通过颜色快速识别</p>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>不同造型区分</h3>
      <p>不同类型用不用造型（金币=钱袋、血瓶=心形、经验=星星、技能=宝石等）</p>
      <p style="color:#888;font-size:12px">最直观，但需要多种素材</p>
    </div>
  </div>
</div>

<div style="margin-top:30px;padding:15px;background:#f5f5f5;border-radius:8px">
  <p class="label">当前状态参考</p>
  <p style="font-size:14px">现有宝箱是简单的棕色方块 + 金边 + 发光效果，比较粗糙</p>
</div>
