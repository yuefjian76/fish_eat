<h2>海底背景设计</h2>
<p class="subtitle">需要真实海底效果：海洋生物、珊瑚、气泡</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>程序化生成（推荐）</h3>
      <p>用代码绘制珊瑚、海藻、气泡动画。性能好，可动态变化。</p>
      <p style="color:#888;font-size:12px">气泡上升动画 + 漂浮海藻 + 静态珊瑚</p>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>图片素材</h3>
      <p>使用真实海底图片作为背景，需要找免费素材或自己制作</p>
      <p style="color:#888;font-size:12px">更真实，但缺乏动态效果</p>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>混合方式</h3>
      <p>图片做背景底层，程序化生成的前景装饰（气泡、海藻移动）</p>
      <p style="color:#888;font-size:12px">最佳效果，但工作量较大</p>
    </div>
  </div>
</div>

<div style="margin-top:30px;padding:15px;background:#f5f5f5;border-radius:8px">
  <p class="label">当前状态</p>
  <p style="font-size:14px">现在只有纯色渐变背景（深蓝→浅蓝），完全没有水下环境元素</p>
</div>
