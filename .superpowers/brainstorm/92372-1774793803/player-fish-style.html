<h2>玩家鱼外观设计</h2>
<p class="subtitle">需要比敌人更特殊、更漂亮</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>程序化美化小丑鱼（推荐）</h3>
      <p>保留小丑鱼造型，增加更多细节：条纹发光、鳍部优化、特效光晕</p>
      <p style="color:#888;font-size:12px">与敌人风格统一，但更精美</p>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>完全不同的造型</h3>
      <p>玩家用独特的鱼种（如神仙鱼、狮子鱼），明显区别于敌人</p>
      <p style="color:#888;font-size:12px">区分度高，但可能破坏游戏一致性</p>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>小丑鱼 + 装备皮肤</h3>
      <p>基础小丑鱼造型 + 可穿戴装饰（帽子、围巾等）随等级解锁</p>
      <p style="color:#888;font-size:12px">有成长感，但工作量较大</p>
    </div>
  </div>
</div>

<div style="margin-top:30px;padding:15px;background:#f5f5f5;border-radius:8px">
  <p class="label">当前状态</p>
  <p style="font-size:14px">玩家和敌人（小丑鱼、虾、鲨鱼）用完全相同的几何形状绘制，只是颜色不同</p>
</div>
